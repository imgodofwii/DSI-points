<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pin → Image Lookup</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    :root { --gap: 14px; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow-x: hidden;
    }

    .wrap {
      display: flex;
      gap: var(--gap);
      padding: var(--gap);
      height: 100vh;
      box-sizing: border-box;
    }

    .left, .middle, .right {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .left {
      flex: 1;
    }

    .middle {
      width: 32vw;
      max-width: 380px;
      display: flex;
      align-items: flex-start; /* Align the FX2 section at the top */
      justify-content: flex-start; /* Align content to the start */
    }

    .right {
      width: 32vw;
      max-width: 380px;
      border-left: 1px solid #e5e5e5;
      padding-left: var(--gap);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: var(--gap);
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 15px;
    }

    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      font-size: 15px;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      outline: none;
    }

    .hint {
      color: #666;
      font-size: 12px;
      margin-top: 6px;
    }

    .imgbox {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .imgbox img {
      max-width: 100%;
      max-height: 73vh;
      height: auto;
      width: auto;
      border-radius: 10px;
      border: 1px solid #e5e5e5;
      background: #fff;
    }

    .status {
      font-size: 12px;
      color: #444;
      padding: 6px 10px;
      border: 1px solid #e5e5e5;
      border-radius: 999px;
      background: #fafafa;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status.err {
      color: #8a1f1f;
      border-color: #f0c2c2;
      background: #fff5f5;
    }

    .right img {
      max-width: 100%;
      max-height: 90vh;
      height: auto;
      width: auto;
      border-radius: 10px;
      border: 1px solid #e5e5e5;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="left">
      <div class="card">
        <label for="q">Type solder point here:</label>
        <input id="q" type="text" placeholder="Type solder point here" autocomplete="off" />
        <div class="hint">
          Not case sensitive. "_" and "-" are optional (e.g. CN2-29, CN2 29, CN229 all work).
        </div>
      </div>

      <div class="imgbox">
        <img id="resultImg" src="dsimobo/1.jpg" alt="dsimobo Image" />
        <div id="status" class="status">Showing: 1.jpg</div>
      </div>
    </main>

    <section class="middle">
      <div class="imgbox">
        <!-- Second Image Box for FX2 folder -->
        <img id="resultImgFX2" src="FX2/1.jpg" alt="FX2 Image" />
      </div>
    </section>

    <aside class="right">
      <img src="偽トロi配線.png" alt="Wiring chart (reference)" />
    </aside>
  </div>

  <script>
    function norm(s) {
      return String(s || "").toLowerCase().replace(/[^a-z0-9]/g, "");
    }

    // Lookup tables for both dsimobo and FX2 folders
    const lookupDsimobo = new Map();
    const lookupFX2 = new Map();

    // Function to add image paths for both folders
    function addToDsimobo(img, keys) {
      for (const k of keys) lookupDsimobo.set(norm(k), img);
    }

    function addToFX2(img, keys) {
      for (const k of keys) lookupFX2.set(norm(k), img);
    }

    // Adding images to the lookup table for both folders (dsimobo and FX2)
    addToDsimobo("dsimobo/1.jpg", [""]);
    addToFX2("FX2/1.jpg", [""]);

    // Adding more image mappings for dsimobo and FX2
    addToDsimobo("dsimobo/2.jpg", ["DLK", "DCLK", "PIN_62", "CN2-29"]);
    addToFX2("FX2/2.jpg", ["DLK", "DCLK", "PIN_62", "CN2-29"]);
    addToDsimobo("dsimobo/3.jpg", ["LS", "PIN_66", "CN2-31"]);
    addToFX2("FX2/3.jpg", ["LS", "PIN_66", "CN2-31"]);
    addToDsimobo("dsimobo/4.jpg", ["GSP", "PIN_67", "CN2-32"]);
    addToFX2("FX2/4.jpg", ["GSP", "PIN_67", "CN2-32"]);

    const seq = [
      ["LCDB10", "PIN_44", "CN2-15"],
      ["LCDB11", "PIN_47", "CN2-16"],
      ["LCDB12", "PIN_48", "CN2-17"],
      ["LCDB13", "PIN_49", "CN2-18"],
      ["LCDB14", "PIN_50", "CN2-19"],
      ["LCDB15", "PIN_51", "CN2-20"],
      ["LCDR10", "PIN_52", "CN2-21"],
      ["LCDR11", "PIN_53", "CN2-22"],
      ["LCDR12", "PIN_54", "CN2-23"],
      ["LCDR13", "PIN_55", "CN2-24"],
      ["LCDR14", "PIN_56", "CN2-25"],
      ["LCDR15", "PIN_57", "CN2-26"],
      ["LCDG10", "PIN_70", "CN2-35"],
      ["LCDG11", "PIN_71", "CN2-36"],
      ["LCDG12", "PIN_72", "CN2-37"]
    ];

    let imgNum = 5;
    for (const [label, pin, cn] of seq) {
      const img = `dsimobo/${imgNum}.jpg`;
      const fx2Img = `FX2/${imgNum}.jpg`;
      addToDsimobo(img, [label, pin, cn]);
      addToFX2(fx2Img, [label, pin, cn]);
      imgNum++;
    }

    const input = document.getElementById("q");
    const resultImg = document.getElementById("resultImg");
    const resultImgFX2 = document.getElementById("resultImgFX2");
    const status = document.getElementById("status");

    function setStatus(text, isErr) {
      status.textContent = text;
      status.classList.toggle("err", !!isErr);
    }

    // If an image filename doesn't exist, show it clearly and fall back.
    resultImg.addEventListener("error", () => {
      const attempted = resultImg.getAttribute("data-attempted") || resultImg.src;
      setStatus(`Missing file: ${attempted} (check repo filenames)`, true);
      resultImg.src = "dsimobo/1.jpg";
      resultImg.setAttribute("data-attempted", "");
    });

    resultImgFX2.addEventListener("error", () => {
      const attempted = resultImgFX2.getAttribute("data-attempted") || resultImgFX2.src;
      setStatus(`Missing file: ${attempted} (check repo filenames)`, true);
      resultImgFX2.src = "FX2/1.jpg";
      resultImgFX2.setAttribute("data-attempted", "");
    });

    function update() {
      const key = norm(input.value);

      // Update the first image box (dsimobo) based on the search input
      const img = lookupDsimobo.get(key) || "dsimobo/1.jpg";
      resultImg.setAttribute("data-attempted", img);
      resultImg.src = img;

      // Update the second image box (FX2) based on the search input
      const fx2Img = lookupFX2.get(key) || "FX2/1.jpg";
      resultImgFX2.setAttribute("data-attempted", fx2Img);
      resultImgFX2.src = fx2Img;

      setStatus(`Showing: ${img}`, false);
    }

    input.addEventListener("input", update);
    update();
  </script>
</body>
</html>
